<svg viewBox="0 0 900 240" xmlns="http://www.w3.org/2000/svg" width="900" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#04080f"/>
      <stop offset="50%"  style="stop-color:#0a1220"/>
      <stop offset="100%" style="stop-color:#04080f"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#60A5FA"/>
      <stop offset="50%"  style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#3B82F6;stop-opacity:0"/>
      <stop offset="30%"  style="stop-color:#60A5FA"/>
      <stop offset="70%"  style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#0d1a35"/>
      <stop offset="100%" style="stop-color:#04080f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="240" fill="url(#bg)"/>

  <!-- Grid lines -->
  <line x1="0" y1="40"  x2="900" y2="40"  stroke="#3B82F6" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.12"/>
  <line x1="0" y1="80"  x2="900" y2="80"  stroke="#3B82F6" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.12"/>
  <line x1="0" y1="120" x2="900" y2="120" stroke="#6366F1" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.12"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="#3B82F6" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.12"/>
  <line x1="0" y1="200" x2="900" y2="200" stroke="#3B82F6" stroke-width="0.2" stroke-dasharray="4,10" opacity="0.07"/>

  <!-- Pipeline connector -->
  <line x1="50" y1="163" x2="850" y2="163" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.5"/>

  <!-- Arrow connectors -->
  <line x1="158" y1="163" x2="193" y2="163" stroke="#60A5FA" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
  </line>
  <polygon points="193,159 201,163 193,167" fill="#60A5FA" opacity="0.85"/>

  <line x1="313" y1="163" x2="348" y2="163" stroke="#3B82F6" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.36s" repeatCount="indefinite"/>
  </line>
  <polygon points="348,159 356,163 348,167" fill="#3B82F6" opacity="0.85"/>

  <line x1="468" y1="163" x2="503" y2="163" stroke="#6366F1" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.72s" repeatCount="indefinite"/>
  </line>
  <polygon points="503,159 511,163 503,167" fill="#6366F1" opacity="0.85"/>

  <line x1="623" y1="163" x2="658" y2="163" stroke="#3B82F6" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="1.08s" repeatCount="indefinite"/>
  </line>
  <polygon points="658,159 666,163 658,167" fill="#3B82F6" opacity="0.85"/>

  <line x1="778" y1="163" x2="813" y2="163" stroke="#60A5FA" stroke-width="1.5" opacity="0.7">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="1.44s" repeatCount="indefinite"/>
  </line>
  <polygon points="813,159 821,163 813,167" fill="#60A5FA" opacity="0.85"/>

  <!-- Node: SELECT -->
  <rect x="50"  y="143" width="108" height="40" rx="7" fill="url(#nodeGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="104" y="158" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#60A5FA" font-weight="bold">SELECT</text>
  <text x="104" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#93C5FD">query basics</text>

  <!-- Node: JOIN -->
  <rect x="201" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="257" y="158" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#60A5FA" font-weight="bold">JOIN</text>
  <text x="257" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#93C5FD">link tables</text>

  <!-- Node: GROUP BY (pulse) -->
  <rect x="356" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#6366F1" stroke-width="1.5" filter="url(#glow)"/>
  <text x="412" y="158" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#A5B4FC" font-weight="bold">GROUP BY</text>
  <text x="412" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#C7D2FE">aggregation</text>
  <rect x="356" y="143" width="112" height="40" rx="7" fill="none" stroke="#6366F1" stroke-width="1" opacity="0">
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="rx" values="7;13;7" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Node: INDEX -->
  <rect x="511" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#6366F1" stroke-width="1.5" filter="url(#glow)"/>
  <text x="567" y="158" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#A5B4FC" font-weight="bold">INDEX</text>
  <text x="567" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#C7D2FE">performance</text>

  <!-- Node: CTE -->
  <rect x="666" y="143" width="112" height="40" rx="7" fill="url(#nodeGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="722" y="158" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#60A5FA" font-weight="bold">CTE</text>
  <text x="722" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#93C5FD">advanced queries</text>

  <!-- Node: EXPLAIN -->
  <rect x="821" y="143" width="79" height="40" rx="7" fill="url(#nodeGrad)" stroke="#3B82F6" stroke-width="1.5" filter="url(#glow)"/>
  <text x="860" y="158" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#60A5FA" font-weight="bold">EXPLAIN</text>
  <text x="860" y="173" text-anchor="middle" font-family="'Courier New', monospace" font-size="8"  fill="#93C5FD">optimize</text>

  <!-- Top bar -->
  <rect x="200" y="38" width="500" height="1.5" fill="url(#lineGrad)" rx="1">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <text x="450" y="68" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="bold" fill="#1E3A5F" letter-spacing="8">THE LANGUAGE EVERY ENGINEER MUST KNOW</text>

  <text x="450" y="128" text-anchor="middle" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="url(#titleGrad)" filter="url(#softglow)" letter-spacing="8">SQL</text>

  <line x1="50" y1="232" x2="850" y2="232" stroke="url(#lineGrad)" stroke-width="1.5" opacity="0.4"/>
  <text x="450" y="222" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#1E3A5F" letter-spacing="4">QUERIES  ·  JOINS  ·  SCHEMA  ·  PERFORMANCE  ·  REAL WORLD</text>
</svg>
